name: Server AI Tests

on:
  push:
    branches: [main, master]
    paths:
      - 'src/ai/**'
      - 'config/plugins/**'
      - 'scripts/fixtures/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'vitest.config.ts'
      - '.github/workflows/ai-tests.yml'
  pull_request:
    paths:
      - 'src/ai/**'
      - 'config/plugins/**'
      - 'scripts/fixtures/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'vitest.config.ts'
      - '.github/workflows/ai-tests.yml'

jobs:
  ai-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: pnpm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Plugin validate
        run: pnpm run plugin:validate

      - name: AI unit tests
        run: pnpm test -- --run src/ai/__tests__/
        env:
          SKIP_PERMISSION_CHECK: 'true'
