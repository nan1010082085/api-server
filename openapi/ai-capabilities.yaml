openapi: "3.0.3"

info:
  title: AI 能力 API
  description: |
    AI 能力模块，包含：
    - AI 核心（对话、版本、行为、同步）
    - AI 健康检查
    - AI 监控
    - 插件市场
    - RAG 知识库
    - LLM Provider
    - AI 协作
    - 提示词模板
    - Agent Workflow
    - 高级功能
    - Provider 管理
    - AI 模型
    - 文档解析
  version: "1.0.0"

servers:
  - url: http://localhost:3001
    description: 开发环境

tags:
  - name: ai-core
    description: AI 核心
  - name: ai-health
    description: AI 健康检查
  - name: ai-monitor
    description: AI 监控
  - name: ai-plugins
    description: 插件市场
  - name: ai-rag
    description: RAG 知识库
  - name: ai-llm-providers
    description: LLM Provider
  - name: ai-collaboration
    description: AI 协作
  - name: ai-prompts
    description: 提示词模板
  - name: ai-workflows
    description: Agent Workflow
  - name: ai-advanced
    description: 高级功能
  - name: ai-providers
    description: Provider 管理
  - name: ai-models
    description: AI 模型
  - name: ai-documents
    description: 文档解析

paths:
  # ==================== AI 核心 ====================
  /api/ai/conversations:
    get:
      tags: [ai-core]
      summary: 对话列表
      operationId: listAiConversations
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResponse"

  /api/ai/conversations/search:
    get:
      tags: [ai-core]
      summary: 搜索对话
      operationId: searchAiConversations
      parameters:
        - name: q
          in: query
          required: true
          description: "搜索关键词"
          schema:
            type: string
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResponse"

  /api/ai/conversations/{id}:
    get:
      tags: [ai-core]
      summary: 对话详情
      operationId: getAiConversation
      parameters:
        - $ref: "#/components/parameters/ObjectIdParam"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
    delete:
      tags: [ai-core]
      summary: 删除对话
      operationId: deleteAiConversation
      parameters:
        - $ref: "#/components/parameters/ObjectIdParam"
      responses:
        "200":
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/ai/messages/{id}/feedback:
    post:
      tags: [ai-core]
      summary: 消息反馈
      description: 消息反馈（正面/负面）
      operationId: feedbackAiMessage
      parameters:
        - $ref: "#/components/parameters/ObjectIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
              properties:
                type:
                  type: string
                  enum: ["positive", "negative"]
                comment:
                  type: string
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/ai/conversations/{id}/versions:
    get:
      tags: [ai-core]
      summary: 版本历史
      operationId: listAiConversationVersions
      parameters:
        - $ref: "#/components/parameters/ObjectIdParam"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        version:
                          type: integer
                        createdAt:
                          type: string
                          format: date-time

  /api/ai/versions/compare:
    get:
      tags: [ai-core]
      summary: 版本对比
      description: 版本对比（结构化 diff）
      operationId: compareAiVersions
      parameters:
        - name: v1
          in: query
          required: true
          description: "版本 1 ID"
          schema:
            type: string
        - name: v2
          in: query
          required: true
          description: "版本 2 ID"
          schema:
            type: string
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      diff:
                        type: object
                        description: "结构化 diff"

  /api/ai/versions/{versionId}:
    get:
      tags: [ai-core]
      summary: 获取版本内容
      operationId: getAiVersion
      parameters:
        - name: versionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/ai/conversations/{id}/rollback:
    post:
      tags: [ai-core]
      summary: 回滚到指定版本
      operationId: rollbackAiConversation
      parameters:
        - $ref: "#/components/parameters/ObjectIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - versionId
              properties:
                versionId:
                  type: string
      responses:
        "200":
          description: 回滚成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/ai/publish:
    post:
      tags: [ai-core]
      summary: 发布 AI 生成的 Schema/Flow
      operationId: publishAiArtifact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
                - data
              properties:
                type:
                  type: string
                  enum: ["schema", "flow"]
                data:
                  type: object
                conversationId:
                  type: string
                versionId:
                  type: string
      responses:
        "200":
          description: 发布成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/ai/industries:
    get:
      tags: [ai-core]
      summary: 行业 Agent 列表
      operationId: listIndustries
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        description:
                          type: string

  /api/ai/industries/{industry}/templates:
    get:
      tags: [ai-core]
      summary: 行业模板
      operationId: getIndustryTemplates
      parameters:
        - name: industry
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        description:
                          type: string

  /api/ai/behavior:
    post:
      tags: [ai-core]
      summary: 记录用户行为
      operationId: recordUserBehavior
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - action
              properties:
                action:
                  type: string
                  description: "行为类型"
                target:
                  type: string
                  description: "目标对象"
                metadata:
                  type: object
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/ai/behavior/batch:
    post:
      tags: [ai-core]
      summary: 批量记录行为
      operationId: batchRecordUserBehavior
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - behaviors
              properties:
                behaviors:
                  type: array
                  items:
                    type: object
                    properties:
                      action:
                        type: string
                      target:
                        type: string
                      metadata:
                        type: object
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/ai/behavior/preferences:
    get:
      tags: [ai-core]
      summary: 获取用户偏好
      operationId: getUserPreferences
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    description: "用户偏好设置"

  /api/ai/behavior/stats:
    get:
      tags: [ai-core]
      summary: 行为统计
      operationId: getBehaviorStats
      parameters:
        - name: days
          in: query
          description: "统计天数"
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    description: "行为统计"

  /api/ai/mention/search/{type}:
    get:
      tags: [ai-core]
      summary: "@提及搜索"
      description: "@提及搜索（schema/flow/widget）"
      operationId: searchMention
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: ["schema", "flow", "widget"]
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        type:
                          type: string

  /api/ai/sync/schema/{schemaId}/flows:
    get:
      tags: [ai-core]
      summary: Schema → Flow 反向查询
      operationId: getSchemaRelatedFlows
      parameters:
        - name: schemaId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string

  /api/ai/sync/flow/{flowId}/node/{nodeId}/schema:
    get:
      tags: [ai-core]
      summary: Flow → Schema 正向查询
      operationId: getFlowNodeSchema
      parameters:
        - name: flowId
          in: path
          required: true
          schema:
            type: string
        - name: nodeId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      schemaId:
                        type: string
                      schema:
                        type: object

  /api/ai/sync/schema/{schemaId}/update-flows:
    post:
      tags: [ai-core]
      summary: Schema 更新时同步 Flow
      operationId: syncSchemaToFlows
      parameters:
        - name: schemaId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 同步成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/ai/sync/bind:
    post:
      tags: [ai-core]
      summary: 绑定 Schema 到 Flow 节点
      operationId: bindSchemaToFlowNode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - schemaId
                - flowId
                - nodeId
              properties:
                schemaId:
                  type: string
                flowId:
                  type: string
                nodeId:
                  type: string
      responses:
        "200":
          description: 绑定成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/ai/chat/interrupt/{threadId}:
    get:
      tags: [ai-core]
      summary: 检查 HITL 中断状态
      description: "REST 查询，恢复走 `chat:resume` WebSocket"
      operationId: checkChatInterrupt
      parameters:
        - name: threadId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      interrupted:
                        type: boolean
                      message:
                        type: string
                      options:
                        type: array
                        items:
                          type: object

  # ==================== AI 健康检查 ====================
  /api/ai/health:
    get:
      tags: [ai-health]
      summary: AI 健康检查
      description: AI Provider 连通性和 API Key 状态
      operationId: getAiHealth
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: "ok"
                      providers:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            status:
                              type: string
                              enum: ["ok", "error"]
                            message:
                              type: string

  # ==================== AI 监控 ====================
  /api/ai/monitor/stats:
    get:
      tags: [ai-monitor]
      summary: Agent 性能统计
      description: Agent 性能统计（聚合）
      operationId: getAiMonitorStats
      parameters:
        - name: days
          in: query
          description: "统计天数"
          schema:
            type: integer
            default: 7
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      totalCalls:
                        type: integer
                      successRate:
                        type: number
                      avgResponseTime:
                        type: number
                      totalTokens:
                        type: integer

  /api/ai/monitor/recent:
    get:
      tags: [ai-monitor]
      summary: 最近 Agent 指标
      operationId: getRecentAiMetrics
      parameters:
        - name: limit
          in: query
          description: "返回数量"
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        agentType:
                          type: string
                        duration:
                          type: number
                        tokens:
                          type: integer
                        status:
                          type: string
                        createdAt:
                          type: string
                          format: date-time

  /api/ai/monitor/alerts:
    get:
      tags: [ai-monitor]
      summary: 性能告警
      description: 性能告警（慢操作/失败/高 token）
      operationId: getAiAlerts
      parameters:
        - name: type
          in: query
          description: "告警类型"
          schema:
            type: string
            enum: ["slow", "error", "high-token"]
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                        message:
                          type: string
                        severity:
                          type: string
                          enum: ["low", "medium", "high"]
                        createdAt:
                          type: string
                          format: date-time

  /api/ai/monitor/summary:
    get:
      tags: [ai-monitor]
      summary: 快速概览
      operationId: getAiMonitorSummary
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      todayCalls:
                        type: integer
                      activeConversations:
                        type: integer
                      errorRate:
                        type: number

  # ==================== 插件市场 ====================
  /api/ai/plugins:
    get:
      tags: [ai-plugins]
      summary: 插件列表
      operationId: listAiPlugins
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
        - name: category
          in: query
          description: 分类
          schema:
            type: string
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResponse"
    post:
      tags: [ai-plugins]
      summary: 创建插件
      operationId: createAiPlugin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - type
              properties:
                name:
                  type: string
                type:
                  type: string
                  enum: ["expert", "tool", "mcpServer"]
                description:
                  type: string
                config:
                  type: object
                category:
                  type: string
                icon:
                  type: string
      responses:
        "201":
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/ai/plugins/user/installed:
    get:
      tags: [ai-plugins]
      summary: 用户已安装插件
      operationId: listUserInstalledPlugins
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        type:
                          type: string

  /api/ai/plugins/{id}:
    get:
      tags: [ai-plugins]
      summary: 插件详情
      operationId: getAiPlugin
      parameters:
        - $ref: "#/components/parameters/ObjectIdParam"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
    put:
      tags: [ai-plugins]
      summary: 更新插件
      operationId: updateAiPlugin
      parameters:
        - $ref: "#/components/parameters/ObjectIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                config:
                  type: object
                category:
                  type: string
                icon:
                  type: string
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
    delete:
      tags: [ai-plugins]
      summary: 删除插件
      operationId: deleteAiPlugin
      parameters:
        - $ref: "#/components/parameters/ObjectIdParam"
      responses:
        "200":
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/ai/plugins/{id}/install:
    post:
      tags: [ai-plugins]
      summary: 安装插件
      operationId: installAiPlugin
      parameters:
        - $ref: "#/components/parameters/ObjectIdParam"
      responses:
        "200":
          description: 安装成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/ai/plugins/{id}/uninstall:
    post:
      tags: [ai-plugins]
      summary: 卸载插件
      operationId: uninstallAiPlugin
      parameters:
        - $ref: "#/components/parameters/ObjectIdParam"
      responses:
        "200":
          description: 卸载成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  # ==================== RAG 知识库 ====================
  /api/ai/rag/search:
    get:
      tags: [ai-rag]
      summary: RAG 语义搜索
      operationId: searchRag
      parameters:
        - name: q
          in: query
          required: true
          description: "搜索查询"
          schema:
            type: string
        - name: limit
          in: query
          description: "返回数量"
          schema:
            type: integer
            default: 5
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        score:
                          type: number
                        content:
                          type: string
                        metadata:
                          type: object

  /api/ai/rag/reindex:
    post:
      tags: [ai-rag]
      summary: 重建索引
      description: 批量重建所有 Schema 和 Flow 的向量嵌入索引
      operationId: reindexRag
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      total:
                        type: integer
                      created:
                        type: integer
                      updated:
                        type: integer
                      skipped:
                        type: integer
                      errors:
                        type: integer

  /api/ai/rag/status:
    get:
      tags: [ai-rag]
      summary: 索引状态统计
      operationId: getRagStatus
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      embeddingConfigured:
                        type: boolean
                      autoIndexEnabled:
                        type: boolean
                      totalSchemas:
                        type: integer
                      totalFlows:
                        type: integer
                      totalEmbeddings:
                        type: integer
                      indexed:
                        type: integer
                      unindexed:
                        type: integer
                      stale:
                        type: integer

  /api/ai/rag/{schemaId}:
    delete:
      tags: [ai-rag]
      summary: 删除 Schema 向量嵌入
      description: 删除指定 Schema 的向量嵌入（不删除源 Schema）
