  # ==================== 外部集成（invoke）====================
  /api/ai/workflows/invoke/{slugOrId}:
    post:
      tags: [ai-workflows]
      summary: 执行已发布 workflow
      description: |
        **唯一外部入口**：按 slug 或 workflow `_id` 执行已发布 workflow。

        **鉴权（二选一）**：
        - `X-Workflow-Key`: `wf_...`（workflow 发布时生成的 invokeKey）
        - `X-API-Key`: `sk_...`（平台 API Key）
      operationId: invokeWorkflow
      security: []
      parameters:
        - name: slugOrId
          in: path
          required: true
          description: "workflow slug 或 ID"
          schema:
            type: string
        - name: X-Workflow-Key
          in: header
          description: "workflow 级调用密钥"
          schema:
            type: string
        - name: X-API-Key
          in: header
          description: "平台 API Key"
          schema:
            type: string
        - name: X-Tenant-Id
          in: header
          description: "租户 ID"
          schema:
            type: string
            default: "000000"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                input:
                  type: object
                  description: "工作流输入"
                trigger:
                  type: string
                  enum: ["api", "webhook"]
                  default: "api"
                callbackUrl:
                  type: string
                  format: uri
                  description: "完成时回调 URL（覆盖 workflow 级配置）"
                callbackSecret:
                  type: string
                  description: "回调密钥"
      responses:
        "202":
          description: 已接受
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      executionId:
                        type: string
                        description: "执行 ID"

