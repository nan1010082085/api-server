components:
  schemas:
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
        error:
          type: object
          properties:
            message:
              type: string
    PaginatedResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            items:
              type: array
              items:
                type: object
            total:
              type: integer
            page:
              type: integer
            pageSize:
              type: integer
            totalPages:
              type: integer
    UserInfo:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        displayName:
          type: string
        email:
          type: string
        roles:
          type: array
          items:
            type: string
        status:
          type: integer
    RoleInfo:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        code:
          type: string
        description:
          type: string
        permissions:
          type: array
          items:
            type: string
        data_scope:
          type: string
    DeptInfo:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        parentId:
          type: string
        sort:
          type: integer
        status:
          type: integer
        children:
          type: array
          items:
            $ref: "#/components/schemas/DeptInfo"
    MenuInfo:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        path:
          type: string
        icon:
          type: string
        parentId:
          type: string
        sort:
          type: integer
        type:
          type: string
        permission:
          type: string
        visible:
          type: boolean
        children:
          type: array
          items:
            $ref: "#/components/schemas/MenuInfo"
  parameters:
    PageParam:
      name: page
      in: query
      description: 页码
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSizeParam:
      name: pageSize
      in: query
      description: 每页数量
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    KeywordParam:
      name: keyword
      in: query
      description: 搜索关键词
      schema:
        type: string
    ObjectIdParam:
      name: id
      in: path
      required: true
      description: "资源 ID（MongoDB ObjectId）"
      schema:
        type: string
        pattern: "^[0-9a-fA-F]{24}$"
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
