openapi: 3.1.0
info:
  title: Schema Platform — Agent Workflow Open API
  version: 1.0.0
  description: |
    外部系统通过 API Key 触发已发布 Agent Workflow，并轮询/SSE/回调获取结果。
servers:
  - url: /api/ai/open
security:
  - ApiKeyAuth: []
  - BearerApiKey: []
paths:
  /workflows/{id}/execute:
    post:
      operationId: executeWorkflowById
      summary: 按 workflow ID 执行
      parameters:
        - $ref: '#/components/parameters/WorkflowId'
        - $ref: '#/components/parameters/AsyncQuery'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecuteRequest'
      responses:
        '200':
          description: 执行已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecuteResponse'
        '404':
          $ref: '#/components/responses/WorkflowNotFound'
        '409':
          $ref: '#/components/responses/IdempotencyConflict'
  /workflows/by-slug/{slug}/execute:
    post:
      operationId: executeWorkflowBySlug
      summary: 按 slug 执行
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/AsyncQuery'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecuteRequest'
      responses:
        '200':
          description: 执行已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecuteResponse'
  /workflow-executions/{id}:
    get:
      operationId: getWorkflowExecution
      summary: 查询执行状态
      parameters:
        - $ref: '#/components/parameters/ExecutionId'
      responses:
        '200':
          description: 执行详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionDetailResponse'
  /workflow-executions/{id}/stream:
    get:
      operationId: streamWorkflowExecution
      summary: SSE 进度流
      parameters:
        - $ref: '#/components/parameters/ExecutionId'
      responses:
        '200':
          description: text/event-stream
          content:
            text/event-stream:
              schema:
                type: string
  /workflow-executions/{id}/resume:
    post:
      operationId: resumeWorkflowExecution
      summary: HITL 恢复
      parameters:
        - $ref: '#/components/parameters/ExecutionId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                input:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: 已恢复
  /workflow-executions/{id}/cancel:
    post:
      operationId: cancelWorkflowExecution
      summary: 取消执行
      parameters:
        - $ref: '#/components/parameters/ExecutionId'
      responses:
        '200':
          description: 已取消
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    BearerApiKey:
      type: http
      scheme: bearer
      bearerFormat: sk_
  parameters:
    WorkflowId:
      name: id
      in: path
      required: true
      schema:
        type: string
        pattern: '^[a-f0-9]{24}$'
    ExecutionId:
      name: id
      in: path
      required: true
      schema:
        type: string
        pattern: '^[a-f0-9]{24}$'
    AsyncQuery:
      name: async
      in: query
      schema:
        type: boolean
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      schema:
        type: string
  schemas:
    ExecuteRequest:
      type: object
      properties:
        input:
          type: object
          additionalProperties: true
        callbackUrl:
          type: string
          format: uri
          description: 单次执行覆盖 workflow 级 onCompleteWebhook
        callbackSecret:
          type: string
          description: 回调 HMAC 密钥（X-Webhook-Signature: sha256=...）
    ExecuteResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          oneOf:
            - $ref: '#/components/schemas/WorkflowExecution'
            - $ref: '#/components/schemas/AsyncExecuteEnvelope'
    AsyncExecuteEnvelope:
      type: object
      properties:
        executionId:
          type: string
        status:
          type: string
        pollUrl:
          type: string
        streamUrl:
          type: string
    WorkflowExecution:
      type: object
      properties:
        id:
          type: string
        workflowId:
          type: string
        status:
          type: string
          enum: [running, success, error, waiting, cancelled]
        trigger:
          type: string
          enum: [manual, chat, webhook, api]
        nodeRecords:
          type: array
          items:
            type: object
    ExecutionDetailResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/WorkflowExecution'
    ErrorBody:
      type: object
      properties:
        success:
          type: boolean
        error:
          type: object
          properties:
            message:
              type: string
            code:
              type: string
  responses:
    WorkflowNotFound:
      description: workflow 不存在或未发布
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    IdempotencyConflict:
      description: 幂等键冲突
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
